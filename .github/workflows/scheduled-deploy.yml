name: Scheduled Deployment

on:
  schedule:
    # 毎日午前3時（UTC）に実行
    - cron: '0 3 * * *'
  
  workflow_dispatch:

jobs:
  refresh-instagram-token:
    runs-on: ubuntu-latest
    steps:
      - name: Instagram Token Refresh
        run: |
          # ギャラリーページにアクセス → APIが起動されトークンがリフレッシュされる
          curl -s -o /dev/null -w "%{http_code}" "https://www.fuminozawa.com/api/instagram"

  trigger-deploy:
    needs: refresh-instagram-token
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deployment
        run: |
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_JciTlmAuAooKyjPlGyUtC6fueaFJ/GJTdU63TlM"